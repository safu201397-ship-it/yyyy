<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電腦教室租用費用懶人試算表</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator-container">
        <div class="calculator-header">
            <h1>💻 電腦教室租用費用 <span>懶人試算表</span></h1>
            <p>快速計算場地租用、軟體安裝、人員協助與相關雜費。支援一般機構與專案優惠試算。</p>
        </div>

        <div class="calculator-grid">
            <!-- Left Column: Inputs -->
            <div class="calc-section inputs-section">

                <!-- 1. 教室類型與數量 -->
                <div class="form-group slide-in">
                    <label class="section-label">1. 選擇教室類型與數量</label>
                    <div class="input-card flex-row align-items-end" style="gap: 1.5rem; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 250px;">
                            <label>電腦教室類型：</label>
                            <select id="classroom-type" class="premium-select" onchange="updateRoomMaxLimit()">
                                <option value="12000" data-max="6">一般電腦教室 (未滿70人) - $12,000 / 時段</option>
                                <option value="15000" data-max="3">大型電腦教室 (70人以上) - $15,000 / 時段</option>
                                <option value="20000" data-max="2">AI 專業教室 (含算力) - $20,000 / 時段</option>
                            </select>
                        </div>
                        <div style="flex: 0 0 160px;">
                            <label>間數 (上限 <span id="room-limit" class="text-warning font-weight-bold">6</span> 間)：</label>
                            <div class="number-control" style="background:#f8fafc; width:100%;">
                                <button type="button" onclick="updateCount('room-quantity', -1)" style="flex:1">-</button>
                                <input type="number" id="room-quantity" value="1" min="1" max="6" style="flex:1" onchange="validateRoomLimit()">
                                <button type="button" onclick="updateCount('room-quantity', 1)" style="flex:1">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. 日期選擇與每日購物車 -->
                <div class="form-group slide-in" style="animation-delay: 0.1s;">
                    <label class="section-label">2. 租用日程與人員配置</label>
                    <div class="input-card outline-card date-picker-card">
                        <div class="flex-row">
                            <div class="col-half">
                                <label>開始日期</label>
                                <input type="date" id="start-date" class="premium-input">
                            </div>
                            <div class="col-half">
                                <label>結束日期</label>
                                <input type="date" id="end-date" class="premium-input">
                            </div>
                        </div>
                        <button type="button" class="btn-secondary w-100 mt-3"
                            onclick="generateDays()">依日期展開每日配置清單</button>
                    </div>

                    <div id="cart-container" class="mt-3">
                        <!-- 動態生成的每日卡片會放在這 -->
                        <div class="empty-cart-message text-center text-muted"
                            style="padding: 2rem; border: 2px dashed #CBD5E1; border-radius: var(--border-radius-sm);">
                            👉 請先選擇起訖日期並點擊按鈕，即可針對每一天設定時段與所需協助人員。
                        </div>
                    </div>
                </div>

                <!-- 3. 環境與軟硬體雜費 -->
                <div class="form-group slide-in" style="animation-delay: 0.2s;">
                    <label class="section-label">3. 環境軟體與空調 (空調依時段自動計算)</label>
                    <div class="input-card checkbox-grid">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="software-install" value="2000">
                            <span class="checkmark"></span>
                            <div>
                                <span class="chk-title">環境部署/軟體安裝</span>
                                <span class="chk-desc">$2,000 / 次</span>
                            </div>
                        </label>
                        <label class="custom-checkbox" style="opacity: 0.8; cursor: not-allowed;">
                            <input type="checkbox" id="microsoft-license" value="2000" checked disabled>
                            <span class="checkmark" style="background-color: #E2E8F0; border-color: #CBD5E1;"></span>
                            <div>
                                <span class="chk-title">微軟商用授權費 (必定收取)</span>
                                <span class="chk-desc">$2,000 / 次</span>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 4. 優惠身分 -->
            <div class="form-group slide-in" style="animation-delay: 0.3s;">
                <label class="section-label">4. 折扣與優惠資格</label>
                <div class="input-card">
                    <select id="discount-type" class="premium-select" onchange="toggleDiscountDetail()">
                        <option value="1">一般民營機構 (無折扣)</option>
                        <option value="custom">優待專案對象 / 策略聯盟夥伴 (自訂折扣)</option>
                    </select>
                    <div id="discount-detail" class="hidden-details mt-2">
                        <label>約定折扣折數 (例如 8 折請輸入 80)：</label>
                        <div class="discount-input-wrapper">
                            <input type="number" id="discount-rate" value="80" min="1" max="100"
                                class="premium-input text-right">
                            <span class="unit">%</span>
                        </div>
                        <small class="text-muted">※折扣適用於場地費、軟體佈署與空調費（人員協助費除外）。</small>
                    </div>
                </div>
            </div>

        </div>

        <!-- Right Column: Results sticky -->
        <div class="calc-section results-section">
            <div class="sticky-receipt">
                <div class="receipt-header">
                    <h2>🧾 費用估算明細</h2>
                </div>
                <div class="receipt-body">
                    <div class="receipt-row">
                        <span>場地租用費</span>
                        <span id="res-venue">$12,000</span>
                    </div>
                    <div class="receipt-row">
                        <span>人員協助費</span>
                        <span id="res-personnel">$0</span>
                    </div>
                    <div class="receipt-row">
                        <span>環境部署與軟體</span>
                        <span id="res-software">$0</span>
                    </div>
                    <div class="receipt-row">
                        <span>空調費</span>
                        <span id="res-ac">$0</span>
                    </div>

                    <div id="discount-row" class="receipt-row text-success hidden">
                        <span>專案折扣紅利</span>
                        <span id="res-discount">- $0</span>
                    </div>

                    <hr class="receipt-divider">

                    <div class="receipt-row subtotal">
                        <span>小計 (含稅)</span>
                        <span id="res-subtotal">$12,000</span>
                    </div>
                    <div class="receipt-row highlight-row mt-2 text-warning">
                        <div class="w-100">
                            <div class="flex-between">
                                <span>場地保證金 (30%)</span>
                                <span id="res-deposit">$3,600</span>
                            </div>
                            <small class="d-block mt-1">※ 無損壞違規於活動後可無息退還</small>
                        </div>
                    </div>

                </div>
                <div class="receipt-footer">
                    <span>預估總費用</span>
                    <span id="res-total" class="grand-total">$15,600</span>
                </div>

                <button class="btn-primary w-100 mt-4" onclick="window.print()">列印/儲存試算表</button>
                <p class="disclaimer mt-3 text-center text-muted">※ 此表僅供參考，實際收費以圖資處最終報價與合約為準。</p>
            </div>
        </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
