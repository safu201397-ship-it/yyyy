<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電腦教室租用費用懶人試算表</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator-container">
        <div class="calculator-header">
            <h1>💻 電腦教室租用費用 <span>估算表</span></h1>
            <p>快速計算場地租用、軟體安裝、人員協助與相關雜費。此表僅供參考，實際收費及專案折扣以圖資處最終收費為主。</p>
        </div>

        <div class="calculator-grid">
            <!-- Left Column: Inputs -->
            <div class="calc-section inputs-section">

                <!-- 1. 新增租借項目 -->
                <div class="form-group slide-in">
                    <label class="section-label">1. 新增租借項目至清單</label>
                    <div class="input-card outline-card" style="background:#F8FAFC;">
                        <!-- Type and Quantity -->
                        <div class="flex-row align-items-end mb-3" style="gap: 1.5rem; flex-wrap: wrap;">
                            <div style="flex: 1; min-width: 250px;">
                                <label>電腦教室類型：</label>
                                <select id="item-type" class="premium-select" onchange="updateItemRoomLimit()">
                                    <option value="12000" data-max="6" data-name="一般電腦教室">一般電腦教室 (未滿70人) - $12,000/時段
                                    </option>
                                    <option value="15000" data-max="3" data-name="大型電腦教室">大型電腦教室 (70人以上) - $15,000/時段
                                    </option>
                                    <option value="20000" data-max="2" data-name="AI 專業教室">AI 專業教室 (含算力) - $20,000/時段
                                    </option>
                                </select>
                            </div>
                            <div style="flex: 0 0 160px;">
                                <label>間數 (上限 <span id="item-room-limit" class="text-warning font-weight-bold">6</span>
                                    間)：</label>
                                <div class="number-control w-100" style="background:white;">
                                    <button type="button" onclick="updateItemCount('item-rooms', -1)">-</button>
                                    <input type="number" id="item-rooms" value="1" min="1" max="6"
                                        onchange="validateItemLimit()">
                                    <button type="button" onclick="updateItemCount('item-rooms', 1)">+</button>
                                </div>
                            </div>
                        </div>

                        <!-- Segments and Personnel -->
                        <div class="flex-row align-items-end mb-3" style="gap: 1rem; flex-wrap: wrap;">
                            <div style="flex: 1; min-width: 140px;">
                                <label>總時段數：</label>
                                <div class="number-control w-100" style="background:white;">
                                    <button type="button" onclick="updateItemCount('item-segments', -1)">-</button>
                                    <input type="number" id="item-segments" value="1" min="1">
                                    <button type="button" onclick="updateItemCount('item-segments', 1)">+</button>
                                </div>
                            </div>
                            <div style="flex: 1; min-width: 140px;">
                                <label>平日協助(人/天)：</label>
                                <div class="number-control w-100" style="background:white;">
                                    <button type="button"
                                        onclick="updateItemCount('item-weekday-personnel', -1)">-</button>
                                    <input type="number" id="item-weekday-personnel" value="0" min="0">
                                    <button type="button"
                                        onclick="updateItemCount('item-weekday-personnel', 1)">+</button>
                                </div>
                            </div>
                            <div style="flex: 1; min-width: 140px;">
                                <label>假日協助(人/天)：</label>
                                <div class="number-control w-100" style="background:white;">
                                    <button type="button"
                                        onclick="updateItemCount('item-weekend-personnel', -1)">-</button>
                                    <input type="number" id="item-weekend-personnel" value="0" min="0">
                                    <button type="button"
                                        onclick="updateItemCount('item-weekend-personnel', 1)">+</button>
                                </div>
                            </div>
                        </div>

                        <button type="button" class="btn-primary w-100 mt-2" onclick="addToCart()">➕ 加入租借清單</button>
                    </div>
                </div>

                <!-- 2. 租借清單 (Cart) -->
                <div class="form-group slide-in" style="animation-delay: 0.1s;">
                    <label class="section-label">2. 目前租借清單</label>
                    <div id="cart-container" class="cart-container" style="min-height: 100px;">
                        <div id="empty-cart-message" class="text-center text-muted"
                            style="padding: 2rem; border: 2px dashed #CBD5E1; border-radius: var(--border-radius-sm);">
                            🛒 你的清單目前是空的，請從上方新增。
                        </div>
                    </div>
                </div>

                <!-- 3. 環境與軟硬體雜費 -->
                <div class="form-group slide-in" style="animation-delay: 0.2s;">
                    <label class="section-label">3. 全域費用</label>
                    <div class="input-card checkbox-grid mb-3">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="software-install" value="2000" onchange="calculateTotal()">
                            <span class="checkmark"></span>
                            <div>
                                <span class="chk-title">環境部署/軟體安裝</span>
                                <span class="chk-desc">$2,000 / 次</span>
                            </div>
                        </label>
                        <label class="custom-checkbox" style="opacity: 0.8; cursor: not-allowed;">
                            <input type="checkbox" id="microsoft-license" value="2000" checked disabled>
                            <span class="checkmark" style="background-color: #E2E8F0; border-color: #CBD5E1;"></span>
                            <div>
                                <span class="chk-title">微軟商用授權費</span>
                                <span class="chk-desc">$2,000 (必定收取)</span>
                            </div>
                        </label>
                    </div>

                </div>

            </div>

            <!-- Right Column: Results sticky -->
            <div class="calc-section results-section">
                <div class="sticky-receipt">
                    <div class="receipt-header">
                        <h2>🧾 費用估算明細</h2>
                    </div>
                    <div class="receipt-body">
                        <div class="receipt-row">
                            <span>場地租用費</span>
                            <span id="res-venue">$12,000</span>
                        </div>
                        <div class="receipt-row">
                            <span>人員協助費</span>
                            <span id="res-personnel">$0</span>
                        </div>
                        <div class="receipt-row">
                            <span>環境部署與軟體</span>
                            <span id="res-software">$0</span>
                        </div>
                        <div class="receipt-row">
                            <span>空調費</span>
                            <span id="res-ac">$0</span>
                        </div>

                        <hr class="receipt-divider">

                        <div class="receipt-row subtotal">
                            <span>小計 (含稅)</span>
                            <span id="res-subtotal">$12,000</span>
                        </div>
                        <div class="receipt-row highlight-row mt-2 text-warning">
                            <div class="w-100">
                                <div class="flex-between">
                                    <span>場地保證金 (30%)</span>
                                    <span id="res-deposit">$3,600</span>
                                </div>
                                <small class="d-block mt-1">※ 無損壞違規於活動後可無息退還</small>
                            </div>
                        </div>

                    </div>
                    <div class="receipt-footer">
                        <span>預估總費用</span>
                        <span id="res-total" class="grand-total">$15,600</span>
                    </div>

                    <button class="btn-primary w-100 mt-4" onclick="window.print()">列印/儲存試算表</button>
                    <p class="disclaimer mt-3 text-center text-muted">※ 此表僅供參考，實際收費以圖資處最終報價與合約為準。</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
